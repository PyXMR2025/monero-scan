name: Sync
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - run: git config --global user.name "bot"
      - run: git config --global user.email "bot@github.com"

      - run: pip install requests
      - run: python sync.py